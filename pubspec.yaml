name: studynstack
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' 

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2

    
  # UI/Icons
  cupertino_icons: ^1.0.8 
  percent_indicator: ^4.2.3 # Untuk CircularProgress di DeckScreen

  # Database Lokal (Isar)
  isar: ^3.1.0+1 
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3 

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  # Code Generation Tools untuk Isar
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1

  analyzer: ^5.13.0 # atau versi terbaru yang disarankan (9.0.0 jika Anda bisa mendapatkannya)

  flutter_lints: ^6.0.0 # DIATUR AGAR INDENTASINYA SAMA DENGAN build_runner

flutter:
  uses-material-design: true
  assets:
    - assets/data/materi.json
